services:

  postgres:
    image: postgres:16-alpine
    container_name: empresa_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: empresadb
      POSTGRES_USER: empresa_user
      POSTGRES_PASSWORD: empresa_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empresa_user -d empresadb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: empresa_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/empresadb
      SPRING_DATASOURCE_USERNAME: empresa_user
      SPRING_DATASOURCE_PASSWORD: empresa_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      # JWT
      JWT_SECRET: minha-chave-secreta-super-longa-para-producao-trocar-isso-2024
      JWT_EXPIRATION_MS: 86400000   # 24 horas

      # Usuário admin inicial 
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./empresa-frontend
      dockerfile: Dockerfile
    container_name: empresa_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
