# nginx.conf — fica dentro da pasta empresa-frontend/
#
# O Nginx serve os arquivos do React E faz proxy das
# chamadas /empresas para o backend Spring Boot.
# Assim não há problema de CORS em produção.

server {
    listen 80;

    # ── Serve o React (arquivos estáticos) ──────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # Necessário para React Router funcionar
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy para o backend Spring Boot ────────────
    # Qualquer requisição que começa com /empresas ou /actuator
    # é redirecionada para o container do backend
    location /empresas {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location /auth {
    proxy_pass         http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host             $host;
    proxy_set_header   X-Real-IP        $remote_addr;
    proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
}
